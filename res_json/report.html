<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>粉笔行测学习报告</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%232f7cf6'/%3E%3Cpath d='M4 8.4 6.7 11 12 5' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <style>
    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface-soft: #f9fafb;
      --text: #22252b;
      --muted: #707783;
      --line: #e7eaf0;
      --accent: #2f7cf6;
      --accent-soft: #eaf2ff;
      --ok: #17a673;
      --warn: #dc8a00;
      --danger: #d64545;
      --shadow: 0 8px 28px rgba(25, 35, 55, .08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      line-height: 1.55;
    }

    button,
    select,
    input,
    textarea {
      font: inherit;
    }

    .shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0;
    }

    .subtitle,
    .muted {
      color: var(--muted);
    }

    .source-note {
      text-align: right;
      font-size: 13px;
      color: var(--muted);
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      gap: 4px;
      padding: 10px 0;
      margin-bottom: 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--line);
      overflow-x: auto;
    }

    .nav button {
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 10px 14px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      color: var(--muted);
      padding: 10px 14px;
      border-radius: 6px;
      text-decoration: none;
      white-space: nowrap;
    }

    .nav-link:hover {
      background: var(--surface);
      color: var(--accent);
    }

    .nav button[aria-selected="true"] {
      color: var(--accent);
      background: var(--accent-soft);
      font-weight: 600;
    }

    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat {
      min-width: 0;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .stat-label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 650;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .stat-context {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .section {
      margin-top: 22px;
    }

    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 10px;
    }

    h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.7fr) minmax(280px, .9fr);
      gap: 18px;
      align-items: start;
    }

    .surface {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .chart-wrap {
      padding: 16px;
    }

    .chart {
      display: block;
      width: 100%;
      height: 280px;
    }

    .echart {
      width: 100%;
      height: 300px;
    }

    .echart.compact {
      height: 260px;
    }

    .chart text {
      fill: var(--muted);
      font-size: 12px;
    }

    .axis {
      stroke: var(--line);
      stroke-width: 1;
    }

    .trend-line {
      fill: none;
      stroke: var(--accent);
      stroke-width: 2.5;
    }

    .avg-line {
      fill: none;
      stroke: var(--warn);
      stroke-width: 1.5;
      stroke-dasharray: 5 5;
    }

    .dot {
      fill: var(--surface);
      stroke: var(--accent);
      stroke-width: 2;
    }

    .report-charts {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 18px;
    }

    .mini-chart {
      padding: 16px;
    }

    .mini-chart h3 {
      margin: 0 0 14px;
      font-size: 16px;
      font-weight: 600;
    }

    .bar-chart {
      display: grid;
      gap: 12px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 108px minmax(120px, 1fr) 62px;
      gap: 10px;
      align-items: center;
    }

    .bar-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .bar-track {
      height: 10px;
      border-radius: 999px;
      background: #edf0f5;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: var(--accent);
    }

    .bar-fill.alt {
      background: var(--ok);
    }

    .rank-bars {
      display: grid;
      gap: 16px;
    }

    .rank-row {
      display: grid;
      gap: 6px;
    }

    .rank-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .insight-list {
      padding: 8px 16px;
      margin: 0;
      list-style: none;
    }

    .insight-list li {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
    }

    .insight-list li:last-child {
      border-bottom: 0;
    }

    .metric {
      font-weight: 600;
      text-align: right;
      white-space: nowrap;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .table-scroll {
      width: 100%;
      overflow-x: auto;
      border-radius: 8px;
    }

    .table th,
    .table td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }

    .table th {
      color: var(--muted);
      font-weight: 500;
      background: var(--surface-soft);
    }

    .table tr:last-child td {
      border-bottom: 0;
    }

    .progress {
      min-width: 120px;
      height: 8px;
      background: #edf0f5;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: var(--accent);
    }

    .bar.ok {
      background: var(--ok);
    }

    .bar.warn {
      background: var(--warn);
    }

    .history-list {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .history-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      min-height: 74px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
    }

    .history-item:last-child {
      border-bottom: 0;
    }

    .history-title {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 6px;
      overflow-wrap: anywhere;
    }

    .history-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 76px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 500;
      white-space: nowrap;
    }

    .score-pill {
      color: var(--muted);
      white-space: nowrap;
    }

    .score-pill strong {
      color: var(--accent);
      font-weight: 650;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .controls select {
      height: 36px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
    }

    .dropdown-tree {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    details.tree-detail {
      border-bottom: 1px solid var(--line);
    }

    details.tree-detail:last-child {
      border-bottom: 0;
    }

    .tree-detail summary {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 14px 18px;
      cursor: pointer;
      list-style: none;
    }

    .tree-detail summary::-webkit-details-marker {
      display: none;
    }

    .toggle-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      margin-right: 8px;
      border-radius: 50%;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
    }

    .toggle-mark::before {
      content: "+";
    }

    .tree-detail[open] .toggle-mark::before {
      content: "-";
    }

    .tree-detail[open] > summary {
      background: var(--accent-soft);
    }

    .summary-name {
      display: flex;
      align-items: center;
      min-width: 0;
      font-weight: 600;
      overflow-wrap: anywhere;
    }

    .count {
      color: var(--muted);
      white-space: nowrap;
    }

    .tree-body {
      padding: 6px 18px 14px 44px;
    }

    .tree-list,
    .tree-list ul {
      list-style: none;
      padding-left: 0;
      margin: 0;
    }

    .tree-list ul {
      margin-left: 18px;
      border-left: 1px solid var(--line);
      padding-left: 14px;
    }

    .tree-node {
      padding: 8px 0;
    }

    .tree-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
    }

    .tree-name {
      overflow-wrap: anywhere;
    }

    .empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .error {
      padding: 16px;
      color: var(--danger);
      background: #fff4f4;
      border: 1px solid #ffd2d2;
      border-radius: 8px;
    }

    .error a {
      color: var(--danger);
      font-weight: 600;
    }

    @media (max-width: 860px) {
      .topbar,
      .section-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .source-note {
        text-align: left;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .summary-grid,
      .report-charts {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .shell {
        padding: 16px 12px 32px;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .history-item {
        grid-template-columns: 1fr;
      }

      .table-scroll .table {
        min-width: 640px;
      }

      .stat-value {
        font-size: 24px;
      }

      .bar-row {
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .tree-body {
        padding-left: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div>
        <h1>行测学习报告</h1>
        <div class="subtitle" id="reportSubtitle">正在读取报告数据</div>
      </div>
      <div class="source-note" id="sourceNote">数据源：实时接口响应</div>
    </header>

    <nav class="nav" aria-label="报告导航">
      <button type="button" data-panel="overview" aria-selected="true">用户报告</button>
      <button type="button" data-panel="history" aria-selected="false">练习历史</button>
      <button type="button" data-panel="errors" aria-selected="false">我的错题</button>
      <a class="nav-link" href="/admin.html">Cookie 设置</a>
    </nav>

    <main id="app">
      <div class="empty">正在加载 live JSON 数据</div>
    </main>
  </div>

  <script>
    const app = document.getElementById('app');
    const subtitle = document.getElementById('reportSubtitle');
    const sourceNote = document.getElementById('sourceNote');

    const fmtNumber = new Intl.NumberFormat('zh-CN');
    const fmtScore = new Intl.NumberFormat('zh-CN', { maximumFractionDigits: 1 });
    let charts = [];

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function formatDate(ms) {
      const date = new Date(Number(ms));
      if (Number.isNaN(date.getTime())) return '--';
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}.${m}.${d}`;
    }

    function percent(value, digits = 1) {
      if (!Number.isFinite(value)) return '--';
      return `${value.toFixed(digits)}%`;
    }

    async function loadReport() {
      if ((location.hostname === '127.0.0.1' || location.hostname === 'localhost') && location.port === '8765') {
        return loadLocalFallback();
      }
      try {
        const res = await fetch('/api/report', { cache: 'no-store' });
        const payload = await res.json().catch(() => null);
        if (!res.ok || !payload?.ok) {
          const message = payload?.error?.message || `/api/report ${res.status}`;
          const details = payload?.error?.details ? `：${JSON.stringify(payload.error.details)}` : '';
          throw new Error(`${message}${details}`);
        }
        return payload.data;
      } catch (error) {
        if (location.hostname === '127.0.0.1' || location.hostname === 'localhost') {
          return loadLocalFallback();
        }
        throw error;
      }
    }

    async function loadLocalFallback() {
      const [historyRes, reportRes, errorTree] = await Promise.all([
        fetch('live_exercise_history.json', { cache: 'no-store' }).then(res => res.json()),
        fetch('live_user_analysis.json', { cache: 'no-store' }).then(res => res.json()),
        fetch('live_error_keypoint_tree.json', { cache: 'no-store' }).then(res => res.json())
      ]);
      const tikuReport = reportRes.data.tikuReport;
      return {
        summary: {
          userId: tikuReport.userId,
          quiz: tikuReport.userQuiz || {},
          answerCount: tikuReport.answerCount,
          exerciseCount: tikuReport.exerciseCount,
          correctCount: tikuReport.correctCount,
          forecastScore: tikuReport.forecastScore,
          avgForecastScore: tikuReport.avgForecastScore,
          maxForecastScore: tikuReport.maxForecastScore,
          exerciseDay: tikuReport.exerciseDay,
          totalUserCount: tikuReport.totalUserCount,
          scoreRankIndex: tikuReport.scoreRankIndex,
          fullMark: tikuReport.fullMark,
          answerCountRankIndex: tikuReport.answerCountRankIndex
        },
        trends: tikuReport.trends || [],
        keypoints: tikuReport.keypoints || [],
        history: {
          cursor: historyRes.data.cursor,
          items: historyRes.data.historyItems || []
        },
        errors: errorTree,
        meta: {
          stale: true,
          fetched_at: new Date().toISOString(),
          source: 'local-fallback'
        }
      };
    }

    function adaptReport(apiReport) {
      const summary = apiReport.summary || {};
      return {
        userId: summary.userId,
        userQuiz: summary.quiz || {},
        answerCount: summary.answerCount,
        exerciseCount: summary.exerciseCount,
        correctCount: summary.correctCount,
        forecastScore: summary.forecastScore,
        avgForecastScore: summary.avgForecastScore,
        maxForecastScore: summary.maxForecastScore,
        exerciseDay: summary.exerciseDay,
        totalUserCount: summary.totalUserCount,
        scoreRankIndex: summary.scoreRankIndex,
        fullMark: summary.fullMark,
        answerCountRankIndex: summary.answerCountRankIndex,
        trends: apiReport.trends || [],
        keypoints: apiReport.keypoints || []
      };
    }

    function buildStats(report) {
      const accuracy = report.answerCount ? report.correctCount / report.answerCount * 100 : 0;
      const scoreRankPercent = report.totalUserCount ? (1 - report.scoreRankIndex / report.totalUserCount) * 100 : 0;
      const answerRankPercent = report.totalUserCount ? (1 - report.answerCountRankIndex / report.totalUserCount) * 100 : 0;
      return `
        <div class="stats">
          <div class="stat">
            <div class="stat-label">预测分</div>
            <div class="stat-value">${fmtScore.format(report.forecastScore)}</div>
            <div class="stat-context">平均 ${fmtScore.format(report.avgForecastScore)} / 满分 ${report.fullMark}</div>
          </div>
          <div class="stat">
            <div class="stat-label">答题正确率</div>
            <div class="stat-value">${percent(accuracy)}</div>
            <div class="stat-context">${fmtNumber.format(report.correctCount)} / ${fmtNumber.format(report.answerCount)} 题</div>
          </div>
          <div class="stat">
            <div class="stat-label">练习规模</div>
            <div class="stat-value">${fmtNumber.format(report.exerciseCount)}</div>
            <div class="stat-context">${fmtNumber.format(report.exerciseDay)} 天练习记录</div>
          </div>
          <div class="stat">
            <div class="stat-label">分数排名</div>
            <div class="stat-value">${percent(scoreRankPercent)}</div>
            <div class="stat-context">答题量超过 ${percent(answerRankPercent)} 用户</div>
          </div>
        </div>
      `;
    }

    function trendChart(report) {
      const trends = [...report.trends].sort((a, b) => a.time - b.time);
      if (trends.length < 2) return '<div class="empty">趋势点不足</div>';

      return `
        <div class="chart-wrap surface">
          <div class="echart" id="trendChart" role="img" aria-label="预测分趋势图，纵轴最大值为100"></div>
        </div>
      `;
    }

    function keypointRows(keypoints) {
      return keypoints.map(item => {
        const ratio = Number(item.correctRatio) || 0;
        const target = Number(item.targetCorrectRatio) || 0;
        const cls = ratio >= target ? 'ok' : ratio >= target * .75 ? 'warn' : '';
        return `
          <tr>
            <td>${escapeHtml(item.name)}</td>
            <td>${fmtNumber.format(item.answerCount)}</td>
            <td>${percent(ratio)}</td>
            <td>${percent(target, 0)}</td>
            <td>
              <div class="progress" aria-label="${escapeHtml(item.name)}正确率 ${percent(ratio)}">
                <div class="bar ${cls}" style="width:${Math.min(ratio, 100)}%"></div>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    function horizontalBars(items, options = {}) {
      const max = options.max ?? Math.max(...items.map(item => item.value), 1);
      const formatter = options.formatter || (value => fmtNumber.format(value));
      return `
        <div class="bar-chart">
          ${items.map(item => `
            <div class="bar-row">
              <div class="bar-label" title="${escapeHtml(item.label)}">${escapeHtml(item.label)}</div>
              <div class="bar-track" aria-label="${escapeHtml(item.label)} ${formatter(item.value)}">
                <div class="bar-fill ${item.alt ? 'alt' : ''}" style="width:${Math.min(item.value / max * 100, 100)}%"></div>
              </div>
              <div class="metric">${formatter(item.value)}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function reportCharts(report) {
      return `
        <section class="section">
          <div class="section-head">
            <h2>用户报告图表</h2>
            <span class="muted">ECharts 渲染</span>
          </div>
          <div class="report-charts">
            <div class="mini-chart surface">
              <h3>模块正确率</h3>
              <div class="echart compact" id="correctRatioChart" role="img" aria-label="模块正确率图表"></div>
            </div>
            <div class="mini-chart surface">
              <h3>答题量分布</h3>
              <div class="echart compact" id="answerCountChart" role="img" aria-label="答题量分布图表"></div>
            </div>
            <div class="mini-chart surface">
              <h3>排名位置</h3>
              <div class="echart compact" id="rankChart" role="img" aria-label="排名位置图表"></div>
            </div>
            <div class="mini-chart surface">
              <h3>预测分对比</h3>
              <div class="echart compact" id="scoreCompareChart" role="img" aria-label="预测分对比图表"></div>
            </div>
          </div>
        </section>
      `;
    }

    function overviewPanel(report) {
      const sorted = [...report.keypoints].sort((a, b) => (b.answerCount || 0) - (a.answerCount || 0));
      const weakest = [...report.keypoints].filter(item => item.answerCount > 0).sort((a, b) => a.correctRatio - b.correctRatio)[0];
      const strongest = [...report.keypoints].filter(item => item.answerCount > 0).sort((a, b) => b.correctRatio - a.correctRatio)[0];
      return `
        <section class="panel active" id="panel-overview">
          ${buildStats(report)}
          <div class="summary-grid">
            <div>
              <div class="section-head">
                <h2>预测分趋势</h2>
                <span class="muted">${report.trends.length} 个趋势点</span>
              </div>
              ${trendChart(report)}
            </div>
            <div>
              <div class="section-head">
                <h2>报告摘要</h2>
              </div>
              <ul class="insight-list surface">
                <li><span>考试类型</span><span class="metric">${escapeHtml(report.userQuiz?.name || '--')}</span></li>
                <li><span>最高预测分</span><span class="metric">${fmtScore.format(report.maxForecastScore)}</span></li>
                <li><span>练习最多模块</span><span class="metric">${escapeHtml(sorted[0]?.name || '--')}</span></li>
                <li><span>当前薄弱模块</span><span class="metric">${escapeHtml(weakest?.name || '--')}</span></li>
                <li><span>当前优势模块</span><span class="metric">${escapeHtml(strongest?.name || '--')}</span></li>
              </ul>
            </div>
          </div>
          <section class="section">
            <div class="section-head">
              <h2>知识点掌握</h2>
              <span class="muted">正确率与目标正确率对照</span>
            </div>
            <div class="table-scroll">
              <table class="table">
                <thead>
                  <tr>
                    <th>模块</th>
                    <th>答题数</th>
                    <th>正确率</th>
                    <th>目标</th>
                    <th>进度</th>
                  </tr>
                </thead>
                <tbody>${keypointRows(report.keypoints)}</tbody>
              </table>
            </div>
          </section>
          ${reportCharts(report)}
        </section>
      `;
    }

    function historyPanel(historyItems) {
      const finished = historyItems.filter(item => item.status === 1);
      const pending = historyItems.length - finished.length;
      const totalQuestions = finished.reduce((sum, item) => sum + (item.questionCount || 0), 0);
      const totalCorrect = finished.reduce((sum, item) => sum + (item.correctCount || 0), 0);
      return `
        <section class="panel" id="panel-history">
          <div class="stats">
            <div class="stat">
              <div class="stat-label">历史记录</div>
              <div class="stat-value">${historyItems.length}</div>
              <div class="stat-context">当前接口返回条数</div>
            </div>
            <div class="stat">
              <div class="stat-label">已完成练习</div>
              <div class="stat-value">${finished.length}</div>
              <div class="stat-context">${pending} 条可继续做题</div>
            </div>
            <div class="stat">
              <div class="stat-label">完成题量</div>
              <div class="stat-value">${totalQuestions}</div>
              <div class="stat-context">历史列表内统计</div>
            </div>
            <div class="stat">
              <div class="stat-label">列表正确率</div>
              <div class="stat-value">${percent(totalQuestions ? totalCorrect / totalQuestions * 100 : 0)}</div>
              <div class="stat-context">${totalCorrect} / ${totalQuestions} 题</div>
            </div>
          </div>
          <div class="controls">
            <label for="historyFilter" class="muted">状态</label>
            <select id="historyFilter">
              <option value="all">全部</option>
              <option value="finished">已完成</option>
              <option value="pending">继续做题</option>
            </select>
          </div>
          <div class="history-list" id="historyList"></div>
        </section>
      `;
    }

    function renderHistoryList(historyItems, filter = 'all') {
      const list = document.getElementById('historyList');
      const items = historyItems.filter(item => {
        if (filter === 'finished') return item.status === 1;
        if (filter === 'pending') return item.status !== 1;
        return true;
      });
      list.innerHTML = items.length ? items.map(item => `
        <article class="history-item">
          <div>
            <div class="history-title">${escapeHtml(item.sheetName)}</div>
            <div class="history-meta">
              <span>难度 ${fmtScore.format(item.difficulty)}</span>
              <span>${formatDate(item.updatedTime)}</span>
              <span>题量 ${item.questionCount || 0}</span>
            </div>
          </div>
          <div>
            ${item.status === 1
              ? `<span class="score-pill">共${item.questionCount}题，答对 <strong>${item.correctCount}</strong> 题</span>`
              : '<span class="status-pill">继续做题</span>'}
          </div>
        </article>
      `).join('') : '<div class="empty">当前筛选下没有练习记录</div>';
    }

    function countQuestions(node) {
      const own = Array.isArray(node.questionIds) ? node.questionIds.length : 0;
      const child = Array.isArray(node.children) ? node.children.reduce((sum, item) => sum + countQuestions(item), 0) : 0;
      return own + child;
    }

    function renderNode(node) {
      const own = Array.isArray(node.questionIds) ? node.questionIds.length : 0;
      const children = Array.isArray(node.children) ? node.children : [];
      return `
        <li class="tree-node">
          <div class="tree-row">
            <span class="tree-name">${escapeHtml(node.name)}</span>
            <span class="count">${own ? `${own} 题` : ''}</span>
          </div>
          ${children.length ? `<ul>${children.map(renderNode).join('')}</ul>` : ''}
        </li>
      `;
    }

    function renderTreeDetail(node, index = 0) {
      const total = countQuestions(node);
      const children = Array.isArray(node.children) ? node.children : [];
      return `
        <details class="tree-detail" ${index === 0 ? 'open' : ''}>
          <summary>
            <span class="summary-name"><span class="toggle-mark" aria-hidden="true"></span>${escapeHtml(node.name)}</span>
            <span class="count">${total} 题</span>
          </summary>
          <div class="tree-body">
            ${children.length
              ? `<ul class="tree-list">${children.map(renderNode).join('')}</ul>`
              : '<div class="muted">暂无子知识点</div>'}
          </div>
        </details>
      `;
    }

    function errorsPanel(errorTree) {
      const total = errorTree.reduce((sum, item) => sum + countQuestions(item), 0);
      return `
        <section class="panel" id="panel-errors">
          <div class="stats">
            <div class="stat">
              <div class="stat-label">错题节点</div>
              <div class="stat-value">${errorTree.length}</div>
              <div class="stat-context">一级知识点</div>
            </div>
            <div class="stat">
              <div class="stat-label">错题总量</div>
              <div class="stat-value">${total}</div>
              <div class="stat-context">含子知识点聚合</div>
            </div>
            <div class="stat">
              <div class="stat-label">错题最多</div>
              <div class="stat-value">${escapeHtml([...errorTree].sort((a, b) => countQuestions(b) - countQuestions(a))[0]?.name || '--')}</div>
              <div class="stat-context">一级模块</div>
            </div>
            <div class="stat">
              <div class="stat-label">数据状态</div>
              <div class="stat-value">已同步</div>
              <div class="stat-context">来自接口响应</div>
            </div>
          </div>
          <div class="dropdown-tree">
            ${errorTree.map(renderTreeDetail).join('')}
          </div>
        </section>
      `;
    }

    function chartColors() {
      const style = getComputedStyle(document.documentElement);
      return {
        text: style.getPropertyValue('--text').trim(),
        muted: style.getPropertyValue('--muted').trim(),
        line: style.getPropertyValue('--line').trim(),
        accent: style.getPropertyValue('--accent').trim(),
        ok: style.getPropertyValue('--ok').trim(),
        warn: style.getPropertyValue('--warn').trim()
      };
    }

    function registerChart(id, option) {
      const el = document.getElementById(id);
      if (!el || !window.echarts) return;
      const chart = echarts.init(el, null, { renderer: 'canvas' });
      chart.setOption(option);
      charts.push(chart);
    }

    function initCharts(report) {
      charts.forEach(chart => chart.dispose());
      charts = [];
      if (!window.echarts) {
        document.querySelectorAll('.echart').forEach(el => {
          el.innerHTML = '<div class="empty">ECharts 加载失败</div>';
        });
        return;
      }

      const colors = chartColors();
      const trends = [...report.trends].sort((a, b) => a.time - b.time);
      const labels = report.keypoints.map(item => item.name);
      const correctRatios = report.keypoints.map(item => Number(item.correctRatio) || 0);
      const targetRatios = report.keypoints.map(item => Number(item.targetCorrectRatio) || 0);
      const answerCounts = report.keypoints.map(item => Number(item.answerCount) || 0);
      const scoreRankPercent = report.totalUserCount ? (1 - report.scoreRankIndex / report.totalUserCount) * 100 : 0;
      const answerRankPercent = report.totalUserCount ? (1 - report.answerCountRankIndex / report.totalUserCount) * 100 : 0;

      const commonText = {
        color: colors.muted,
        fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif'
      };
      const grid = { left: 44, right: 24, top: 28, bottom: 36, containLabel: true };
      const axisLine = { lineStyle: { color: colors.line } };
      const splitLine = { lineStyle: { color: colors.line } };
      const tooltip = {
        trigger: 'axis',
        backgroundColor: '#fff',
        borderColor: colors.line,
        textStyle: { color: colors.text }
      };

      registerChart('trendChart', {
        color: [colors.accent, colors.warn],
        tooltip: {
          ...tooltip,
          formatter: params => {
            const point = params[0];
            return `${point.axisValue}<br>${point.marker}预测分：${fmtScore.format(point.data)}`;
          }
        },
        grid,
        xAxis: {
          type: 'category',
          data: trends.map(item => formatDate(item.time)),
          axisLabel: commonText,
          axisLine,
          axisTick: { show: false }
        },
        yAxis: {
          type: 'value',
          min: 0,
          max: 100,
          interval: 25,
          axisLabel: commonText,
          axisLine,
          splitLine
        },
        series: [
          {
            name: '预测分',
            type: 'line',
            data: trends.map(item => Number(item.score.toFixed(2))),
            smooth: false,
            symbolSize: 7,
            markLine: {
              symbol: 'none',
              label: { formatter: `平均 ${fmtScore.format(report.avgForecastScore)}`, color: colors.muted },
              lineStyle: { color: colors.warn, type: 'dashed' },
              data: [{ yAxis: report.avgForecastScore }]
            }
          }
        ]
      });

      registerChart('correctRatioChart', {
        color: [colors.accent, colors.warn],
        tooltip,
        legend: { bottom: 0, textStyle: commonText },
        grid: { left: 28, right: 16, top: 18, bottom: 44, containLabel: true },
        xAxis: { type: 'category', data: labels, axisLabel: { ...commonText, interval: 0, rotate: 22 }, axisLine, axisTick: { show: false } },
        yAxis: { type: 'value', min: 0, max: 100, axisLabel: { ...commonText, formatter: '{value}%' }, splitLine },
        series: [
          { name: '正确率', type: 'bar', data: correctRatios.map(v => Number(v.toFixed(1))), barMaxWidth: 22 },
          { name: '目标', type: 'line', data: targetRatios, symbolSize: 6 }
        ]
      });

      registerChart('answerCountChart', {
        color: [colors.accent],
        tooltip,
        grid: { left: 36, right: 20, top: 18, bottom: 30, containLabel: true },
        xAxis: { type: 'value', axisLabel: commonText, splitLine },
        yAxis: { type: 'category', data: labels, axisLabel: commonText, axisLine, axisTick: { show: false } },
        series: [{ name: '答题数', type: 'bar', data: answerCounts, barMaxWidth: 18 }]
      });

      registerChart('rankChart', {
        color: [colors.accent, colors.ok],
        tooltip: { ...tooltip, formatter: params => `${params.name}<br>${params.marker}${percent(params.value)}` },
        grid: { left: 28, right: 24, top: 22, bottom: 28, containLabel: true },
        xAxis: { type: 'value', min: 0, max: 100, axisLabel: { ...commonText, formatter: '{value}%' }, splitLine },
        yAxis: { type: 'category', data: ['分数排名', '答题量排名'], axisLabel: commonText, axisLine, axisTick: { show: false } },
        series: [{
          name: '超过用户比例',
          type: 'bar',
          data: [Number(scoreRankPercent.toFixed(1)), Number(answerRankPercent.toFixed(1))],
          barMaxWidth: 28,
          label: { show: true, position: 'right', formatter: params => percent(params.value), color: colors.text }
        }]
      });

      registerChart('scoreCompareChart', {
        color: [colors.accent],
        tooltip,
        grid: { left: 32, right: 24, top: 18, bottom: 38, containLabel: true },
        xAxis: { type: 'category', data: ['当前预测分', '平均预测分', '历史最高预测分'], axisLabel: { ...commonText, interval: 0 }, axisLine, axisTick: { show: false } },
        yAxis: { type: 'value', min: 0, max: 100, interval: 25, axisLabel: commonText, splitLine },
        series: [{
          name: '预测分',
          type: 'bar',
          data: [report.forecastScore, report.avgForecastScore, report.maxForecastScore].map(v => Number(v.toFixed(1))),
          barMaxWidth: 34,
          label: { show: true, position: 'top', formatter: params => fmtScore.format(params.value), color: colors.text }
        }]
      });
    }

    function activatePanel(panelName) {
      document.querySelectorAll('.nav button').forEach(button => {
        button.setAttribute('aria-selected', String(button.dataset.panel === panelName));
      });
      document.querySelectorAll('.panel').forEach(panel => {
        panel.classList.toggle('active', panel.id === `panel-${panelName}`);
      });
      requestAnimationFrame(() => charts.forEach(chart => chart.resize()));
    }

    function wireInteractions(historyItems, errorTree) {
      document.querySelectorAll('.nav button').forEach(button => {
        button.addEventListener('click', () => activatePanel(button.dataset.panel));
      });

      const filter = document.getElementById('historyFilter');
      filter.addEventListener('change', () => renderHistoryList(historyItems, filter.value));
      renderHistoryList(historyItems);

      document.querySelectorAll('.dropdown-tree details').forEach(detail => {
        detail.addEventListener('toggle', () => {
          if (!detail.open) return;
          document.querySelectorAll('.dropdown-tree details').forEach(other => {
            if (other !== detail) other.open = false;
          });
        });
      });
    }

    async function boot() {
      try {
        const apiReport = await loadReport();
        const report = adaptReport(apiReport);
        const historyItems = apiReport.history?.items || [];
        const errorTree = apiReport.errors || [];

        subtitle.textContent = `${report.userQuiz?.name || '行测'} · 用户 ${report.userId}`;
        sourceNote.textContent = `${apiReport.meta?.stale ? '缓存数据' : '动态数据'} · 更新：${new Date(apiReport.meta?.fetched_at || Date.now()).toLocaleString('zh-CN', { hour12: false })}`;
        app.innerHTML = [
          overviewPanel(report),
          historyPanel(historyItems),
          errorsPanel(errorTree)
        ].join('');
        wireInteractions(historyItems, errorTree);
        initCharts(report);
        window.addEventListener('resize', () => charts.forEach(chart => chart.resize()));
      } catch (error) {
        subtitle.textContent = '报告数据读取失败';
        sourceNote.textContent = '请检查 Cookie 或服务状态';
        app.innerHTML = `<div class="error">报告数据读取失败：${escapeHtml(error.message)}。<a href="/admin.html">前往 Cookie 设置</a></div>`;
      }
    }

    boot();
  </script>
</body>
</html>
